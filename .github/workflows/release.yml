# CoOpt UI — release helper (manual dispatch only).
#
# WHY THIS IS NOT TAG-TRIGGERED:
# The full playable bundle (MacroQuest + E3Next + the MQ2CoOptUI plugin) is built
# from source by Build-Smart.ps1, which needs CMake 3.30 + Visual Studio 2022 and a
# long one-time vcpkg build. GitHub-HOSTED runners ship CMake 4.x and can't do this
# reliably, so an `on: push: tags` build just fails on every release tag. Releases are
# therefore cut LOCALLY and uploaded with scripts/release-all.ps1 / scripts/upload-emu-zip.ps1
# (or `gh release create`). See docs/RELEASE_AND_DEPLOYMENT.md.
#
# WHAT THIS DOES:
# On manual dispatch it builds CoOptUIPatcher.exe (pure-Python, no MQ toolchain needed)
# and uploads it as a downloadable artifact — handy for grabbing a fresh patcher without
# a local build. It does NOT build or publish the EMU bundle or the plugin DLL.

name: Release helper

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patcher:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build patcher exe
        run: |
          python -m pip install -r patcher/requirements.txt --quiet
          Push-Location patcher
          python build_icon.py
          python -m PyInstaller patcher.spec --noconfirm
          Pop-Location
        shell: pwsh

      - name: Upload patcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoOptUIPatcher
          path: patcher/dist/CoOptUIPatcher.exe
          if-no-files-found: error
