# Build CoopUI release zip and patcher exe, then create a GitHub Release when a version tag is pushed.
# Preferred: .\scripts\publish-release.ps1 (generates manifests, commits, tags, pushes)
# Manual:    git tag v0.1.0-alpha && git push origin v0.1.0-alpha
#
# Release assets (3 total):
#   1. CoOptUI_v<version>.zip      — CoOpt UI files only (built by CI via build-release.ps1)
#   2. CoOptUIPatcher.exe            — Desktop patcher (built by CI via PyInstaller)
#   3. CoOptUI-EMU-v<version>.zip   — Full EMU package (built locally, uploaded via upload-emu-zip.ps1)
#
# The full EMU ZIP requires Visual Studio + CMake + Mono SDK so it can't be built in CI.
# After CI creates the draft release, build locally and upload with:
#   .\scripts\upload-emu-zip.ps1 -ZipPath "<path-to-zip>"

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Generate manifests BEFORE building zip/patcher so hashes match the tagged code.
      # This ensures the patcher always serves correct hashes for the release being built.
      - name: Generate release manifests
        run: |
          python patcher/generate_manifest.py
          python patcher/generate_default_config_manifest.py
        shell: pwsh

      # Safety net: commit manifests back to master so patcher always fetches correct hashes.
      # If publish-release.ps1 already committed them (the expected path), this is a no-op.
      - name: Commit manifests to master (idempotent)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release_manifest.json default_config_manifest.json
          git diff --cached --quiet && echo "Manifests already up to date" && exit 0
          git commit -m "chore(ci): regenerate manifests for ${{ github.ref_name }}"
          git push origin HEAD:master
        shell: pwsh

      - name: Build release zip
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: .\scripts\build-release.ps1 -OutputDir $env:GITHUB_WORKSPACE

      - name: Build patcher exe
        run: |
          python -m pip install -r patcher/requirements.txt --quiet
          Push-Location patcher
          python build_icon.py
          python -m PyInstaller patcher.spec
          Pop-Location
        shell: pwsh

      - name: Verify build artifacts
        run: |
          $zip = "CoOptUI_v${{ steps.version.outputs.VERSION }}.zip"
          if (-not (Test-Path $zip)) {
            Write-Error "Release ZIP not found: $zip"
            exit 1
          }
          if (-not (Test-Path "patcher/dist/CoOptUIPatcher.exe")) {
            Write-Error "CoOptUIPatcher.exe was not built at patcher/dist/CoOptUIPatcher.exe"
            exit 1
          }
          Write-Host "Build artifacts verified: $zip and CoOptUIPatcher.exe"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CoOptUI_v${{ steps.version.outputs.VERSION }}.zip
            patcher/dist/CoOptUIPatcher.exe
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
