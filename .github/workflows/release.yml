# Build CoopUI release zip, patcher exe, and optional plugin zip, then create a GitHub Release when a version tag is pushed.
# Usage: tag and push, e.g.  git tag v1.0.0   &&   git push origin v1.0.0
# Assets: CoOptUI-v<version>.zip, CoOptUIPatcher.exe, and (if present) MQ2CoOptUI-v<version>-optional-E3Next-Win32.zip

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build release zip
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: .\scripts\build-release.ps1 -OutputDir $env:GITHUB_WORKSPACE

      - name: Set up Python for patcher
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build patcher exe
        run: |
          python -m pip install -r patcher/requirements.txt --quiet
          Push-Location patcher
          python build_icon.py
          python -m PyInstaller patcher.spec
          Pop-Location
        shell: pwsh

      - name: Verify patcher exe
        run: |
          if (-not (Test-Path "patcher/dist/CoOptUIPatcher.exe")) {
            Write-Error "CoOptUIPatcher.exe was not built at patcher/dist/CoOptUIPatcher.exe"
            exit 1
          }
        shell: pwsh

      - name: Package optional plugin (if pre-built DLL present)
        id: plugin
        run: |
          $dll = "release_artifacts/plugins/MQ2CoOptUI.dll"
          $zipName = "MQ2CoOptUI-v${{ steps.version.outputs.VERSION }}-optional-E3Next-Win32.zip"
          if (Test-Path $dll) {
            Compress-Archive -Path "release_artifacts/plugins/*" -DestinationPath $zipName -Force
            echo "path=$zipName" >> $env:GITHUB_OUTPUT
            echo "included=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "path=" >> $env:GITHUB_OUTPUT
            echo "included=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Build release file list
        id: release_files
        run: |
          $files = @(
            "CoOptUI-v${{ steps.version.outputs.VERSION }}.zip",
            "patcher/dist/CoOptUIPatcher.exe"
          )
          if ("${{ steps.plugin.outputs.included }}" -eq "true") {
            $files += "MQ2CoOptUI-v${{ steps.version.outputs.VERSION }}-optional-E3Next-Win32.zip"
          }
          $list = $files -join "`n"
          echo "list<<EOF" >> $env:GITHUB_OUTPUT
          echo "$list" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_files.outputs.list }}
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
